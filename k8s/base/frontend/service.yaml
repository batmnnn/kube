apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kubelab
  labels:
    app.kubernetes.io/name: frontend
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "kubelab-frontend-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
