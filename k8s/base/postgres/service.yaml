# Headless Service gives StatefulSet pods stable DNS: postgres-0.postgres.kubelab.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubelab
  labels:
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
