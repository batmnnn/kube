# Secrets store sensitive data (base64-encoded at rest, encrypted with etcd encryption in GKE).
# NEVER commit real secrets — use Sealed Secrets, External Secrets Operator, or GCP Secret Manager.
#
# For learning, we use a placeholder. Replace before deploying:
#   echo -n 'your-password' | base64
apiVersion: v1
kind: Secret
metadata:
  name: kubelab-secrets
  namespace: kubelab
  labels:
    app.kubernetes.io/name: kubelab
type: Opaque
stringData:
  # stringData avoids manual base64 encoding during development
  DB_PASSWORD: kubelab-change-me
