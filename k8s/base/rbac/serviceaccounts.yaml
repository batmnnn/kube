# ServiceAccount gives pods an identity for RBAC and Workload Identity on GKE.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelab-api
  namespace: kubelab
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelab-worker
  namespace: kubelab
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelab-frontend
  namespace: kubelab
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
