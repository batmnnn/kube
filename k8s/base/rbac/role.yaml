# Role defines permissions within a namespace (principle of least privilege).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubelab-api-reader
  namespace: kubelab
rules:
  # API only needs to read its own ConfigMap (for dynamic config reload patterns)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kubelab-config"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubelab-api-reader
  namespace: kubelab
subjects:
  - kind: ServiceAccount
    name: kubelab-api
    namespace: kubelab
roleRef:
  kind: Role
  name: kubelab-api-reader
  apiGroup: rbac.authorization.k8s.io
