# GKE-specific resource: configures GCP Load Balancer health checks and session affinity.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: kubelab-backend-config
  namespace: kubelab
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8080
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
