# Frontend-specific health check — nginx listens on port 80, not 8080.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: kubelab-frontend-backend-config
  namespace: kubelab
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /
    port: 80
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
