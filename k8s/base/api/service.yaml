apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kubelab
  labels:
    app.kubernetes.io/name: api
  annotations:
    # Required for GKE Ingress with ClusterIP Services (container-native load balancing).
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "kubelab-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8080
      targetPort: http
