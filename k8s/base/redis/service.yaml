# ClusterIP Service — only reachable inside the cluster (default Service type).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kubelab
  labels:
    app.kubernetes.io/name: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
