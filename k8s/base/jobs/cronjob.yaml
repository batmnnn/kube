# CronJob runs Jobs on a schedule — great for backups, cleanup, reports.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-old-scores
  namespace: kubelab
  labels:
    app.kubernetes.io/name: cleanup-old-scores
    app.kubernetes.io/component: cronjob
spec:
  schedule: "0 3 * * *"    # Every day at 3 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
          containers:
            - name: cleanup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kubelab-secrets
                      key: DB_PASSWORD
              command:
                - sh
                - -c
                - |
                  psql -h postgres -U kubelab -d kubelab -c "
                    DELETE FROM word_scores
                    WHERE created_at < NOW() - INTERVAL '90 days';
                  "
                  echo "Cleanup complete"
