# Job runs a task to completion (one-time). Used here to seed sample data.
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: seed-data
    app.kubernetes.io/component: job
spec:
  ttlSecondsAfterFinished: 300    # Auto-cleanup finished Job after 5 minutes
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed-data
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: seed
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubelab-secrets
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              psql -h postgres -U kubelab -d kubelab -c "
                CREATE TABLE IF NOT EXISTS word_scores (
                  id SERIAL PRIMARY KEY,
                  word TEXT NOT NULL,
                  score INTEGER NOT NULL CHECK (score BETWEEN 1 AND 1000),
                  length INTEGER NOT NULL CHECK (length > 0),
                  length_points INTEGER NOT NULL,
                  uniqueness_points INTEGER NOT NULL,
                  player_name TEXT NOT NULL DEFAULT 'Player',
                  status TEXT NOT NULL DEFAULT 'pending',
                  created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );
                CREATE INDEX IF NOT EXISTS idx_word_scores_score ON word_scores (score DESC, created_at DESC);
              "
              echo "Seed complete"
