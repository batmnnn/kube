# Job runs a task to completion (one-time). Used here to seed sample data.
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: seed-data
    app.kubernetes.io/component: job
spec:
  ttlSecondsAfterFinished: 300    # Auto-cleanup finished Job after 5 minutes
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed-data
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: seed
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubelab-secrets
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              psql -h postgres -U kubelab -d kubelab -c "
                CREATE TABLE IF NOT EXISTS orders (
                  id SERIAL PRIMARY KEY,
                  product TEXT NOT NULL,
                  quantity INTEGER NOT NULL CHECK (quantity > 0),
                  status TEXT NOT NULL DEFAULT 'pending',
                  created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                  updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );
                INSERT INTO orders (product, quantity, status)
                SELECT 'GKE Fundamentals Book', 1, 'processed'
                WHERE NOT EXISTS (SELECT 1 FROM orders LIMIT 1);
                INSERT INTO orders (product, quantity, status)
                SELECT 'Kubernetes Certification', 2, 'pending'
                WHERE (SELECT COUNT(*) FROM orders) < 2;
              "
              echo "Seed complete"
