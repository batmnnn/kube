apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kubelab
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: kubelab-worker
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do sleep 2; done']
      containers:
        - name: worker
          image: kubelab-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kubelab-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubelab-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
