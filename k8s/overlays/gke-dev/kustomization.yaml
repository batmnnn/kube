apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: kubelab-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: development
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

images:
  - name: kubelab-api
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/api
    newTag: IMAGE_TAG
  - name: kubelab-worker
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/worker
    newTag: IMAGE_TAG
  - name: kubelab-frontend
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/frontend
    newTag: IMAGE_TAG
