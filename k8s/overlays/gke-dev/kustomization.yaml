apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: kubelab-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: development
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always

images:
  - name: kubelab-api
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/api
    newTag: latest
  - name: kubelab-worker
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/worker
    newTag: latest
  - name: kubelab-frontend
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/frontend
    newTag: latest
