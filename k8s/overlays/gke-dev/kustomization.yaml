apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: kubelab-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: development
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: replace
        path: /spec/strategy/rollingUpdate/maxUnavailable
        value: 1
      - op: replace
        path: /spec/strategy/rollingUpdate/maxSurge
        value: 0
      - op: replace
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 15
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/strategy/rollingUpdate/maxUnavailable
        value: 1
      - op: replace
        path: /spec/strategy/rollingUpdate/maxSurge
        value: 0
      - op: replace
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 15
  - target:
      kind: PodDisruptionBudget
      name: api-pdb
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 0
  - target:
      kind: BackendConfig
      name: kubelab-backend-config
    patch: |
      - op: replace
        path: /spec/connectionDraining/drainingTimeoutSec
        value: 10
  - target:
      kind: BackendConfig
      name: kubelab-frontend-backend-config
    patch: |
      - op: replace
        path: /spec/connectionDraining/drainingTimeoutSec
        value: 10
  - target:
      kind: HorizontalPodAutoscaler
      name: api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

images:
  - name: kubelab-api
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/api
    newTag: IMAGE_TAG
  - name: kubelab-worker
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/worker
    newTag: IMAGE_TAG
  - name: kubelab-frontend
    newName: REGION-docker.pkg.dev/PROJECT_ID/kubelab/frontend
    newTag: IMAGE_TAG
