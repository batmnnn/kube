name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  OVERLAY: gke-dev

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Compile API
        run: cd app/api && go mod tidy && go build -o /dev/null .

      - name: Compile Worker
        run: cd app/worker && go mod tidy && go build -o /dev/null .

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.4

      - name: Kustomize render check
        run: |
          kubectl kustomize k8s/base > /dev/null
          kubectl kustomize k8s/overlays/local > /dev/null
          kubectl kustomize k8s/overlays/gke-dev \
            | sed 's/PROJECT_ID/example/g' \
            | sed 's/REGION/us-central1/g' \
            | sed 's/IMAGE_TAG/latest/g' \
            > /dev/null

  check-gcp:
    name: Check GCP secrets
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
        run: |
          missing=""
          [ -z "$WIF_PROVIDER" ] && missing="${missing} WIF_PROVIDER"
          [ -z "$WIF_SERVICE_ACCOUNT" ] && missing="${missing} WIF_SERVICE_ACCOUNT"
          [ -z "$GCP_PROJECT_ID" ] && missing="${missing} GCP_PROJECT_ID"
          [ -z "$GKE_CLUSTER" ] && missing="${missing} GKE_CLUSTER"

          if [ -n "$missing" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP secrets missing — build/deploy skipped."
            echo "Add these GitHub secrets:${missing}"
            echo "Setup: ./scripts/setup-github-cicd.sh (see docs/10-cicd.md)"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Push Images
    needs: [test, check-gcp]
    if: needs.check-gcp.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push images
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.REGION }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          GCP_PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID" | tr -d '[:space:]')"
          if ! [[ "$GCP_PROJECT_ID" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "::error::GCP_PROJECT_ID secret is invalid. Use your GCP project ID (e.g. learning-deplo), not the project number or WIF provider path."
            exit 1
          fi

          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/kubelab"
          for img in api worker frontend; do
            docker build -t "${REGISTRY}/${img}:${IMAGE_TAG}" "app/${img}"
            docker push "${REGISTRY}/${img}:${IMAGE_TAG}"
          done

      - name: Tag images as latest (main branch only)
        if: github.ref == 'refs/heads/main'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.REGION }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          GCP_PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID" | tr -d '[:space:]')"
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/kubelab"
          for img in api worker frontend; do
            gcloud artifacts docker tags add \
              "${REGISTRY}/${img}:${IMAGE_TAG}" \
              "${REGISTRY}/${img}:latest" \
              --project="${GCP_PROJECT_ID}"
          done

  deploy:
    name: Deploy to GKE
    needs: [build, check-gcp]
    if: |
      needs.check-gcp.outputs.ready == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy manifests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.REGION }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: ./scripts/deploy.sh ${{ env.OVERLAY }}

      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/api -n kubelab --timeout=180s
          kubectl rollout status deployment/worker -n kubelab --timeout=180s
          kubectl rollout status deployment/frontend -n kubelab --timeout=180s
          kubectl get pods,ingress -n kubelab

      - name: Smoke test (in-cluster)
        run: |
          kubectl run ci-smoke-test \
            --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 \
            -n kubelab \
            --command -- \
            sh -c 'curl -sf http://api:8080/health && curl -sf http://frontend/ | head -1'
