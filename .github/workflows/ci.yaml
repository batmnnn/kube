name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build API
        run: cd app/api && go mod tidy && go build -o /dev/null .

      - name: Build Worker
        run: cd app/worker && go mod tidy && go build -o /dev/null .

      - name: Validate Kubernetes manifests
        uses: helm/kind-action@v1
        with:
          install_only: true
      - run: |
          kubectl kustomize k8s/base > /dev/null
          kubectl kustomize k8s/overlays/local > /dev/null
          kubectl kustomize k8s/overlays/gke-dev > /dev/null

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.REGION }}
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/build-and-push.sh

      - name: Deploy to GKE
        if: ${{ secrets.GKE_CLUSTER != '' }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.REGION }}
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG=${{ github.sha }} OVERLAY=gke-dev ./scripts/deploy.sh gke-dev
